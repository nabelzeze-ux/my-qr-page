
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
        }
        .qr-container {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none; /* مخفية حتى يتم التحميل */
        }
        img {
            max-width: 250px;
            height: 250px;
            display: block;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button {
            margin-top: 25px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: var(--tg-theme-button-color, #31a6d3);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h3 id="status">جاري جلب الرمز...</h3>
    <div id="loader" class="loader"></div>
    <div id="qr_container" class="qr-container">
        <img id="qr_img" src="" alt="QR Code">
    </div>
    <br>
    <button onclick="window.Telegram.WebApp.close();">تم المسح - إغلاق</button>

    <script>
        window.Telegram.WebApp.ready();
        
        // السر هنا: جلب رابط الصورة من الـ URL پارامتر
        const urlParams = new URLSearchParams(window.location.search);
        const qrUrl = urlParams.get('qr_url');

        if (qrUrl) {
            const img = document.getElementById('qr_img');
            const container = document.getElementById('qr_container');
            
            img.src = qrUrl;
            img.onload = function() {
                // عند اكتمال تحميل الصورة، نخفي اللودر ونظهر الصورة
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status').innerText = 'امسح الرمز للدفع';
                container.style.display = 'block';
            };
            img.onerror = function() {
                document.getElementById('status').innerText = '❌ خطأ في تحميل الصورة';
                document.getElementById('loader').style.display = 'none';
            };
        } else {
            document.getElementById('status').innerText = '⚠️ لم يتم تحديد رمز بعد';
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
